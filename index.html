<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍗 現金回報｜鮮樂炸雞</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 16px; }
    .container { max-width: 480px; margin: 0 auto; }
    .header { text-align: center; padding: 20px 0; }
    .header h1 { font-size: 20px; color: #d32f2f; }
    .header p { font-size: 13px; color: #666; margin-top: 4px; }
    
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 14px; color: #333; font-weight: 600; margin-bottom: 16px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fafafa; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #d32f2f; background: white; }
    
    .denom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .denom-item { background: #f5f5f5; border-radius: 8px; padding: 12px; }
    .denom-item .denom-label { font-size: 14px; color: #333; margin-bottom: 4px; }
    .denom-item .denom-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; text-align: right; }
    
    .summary-card { background: #fff3e0; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffe0b2; }
    .summary-row:last-child { border-bottom: none; font-weight: 600; }
    .summary-row span:first-child { color: #333; }
    .summary-row span:last-child { color: #d32f2f; }
    
    .diff-display { text-align: center; padding: 16px; border-radius: 8px; margin-bottom: 16px; font-size: 24px; font-weight: bold; }
    .diff-ok { background: #e8f5e9; color: #2e7d32; }
    .diff-warn { background: #fff3e0; color: #ef6c00; }
    .diff-error { background: #ffebee; color: #c62828; }
    
    .submit-btn { width: 100%; padding: 16px; background: #d32f2f; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .submit-btn:active { background: #b71c1c; }
    .submit-btn:disabled { background: #ccc; }
    
    .result { text-align: center; padding: 24px; }
    .result-icon { font-size: 48px; margin-bottom: 12px; }
    .result-text { font-size: 16px; color: #333; }
    
    .date-badge { text-align: center; background: #d32f2f; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 16px; display: inline-block; }
    .status-bar { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .status-bar.success { background: #d4edda; color: #155724; display: block; }
    .status-bar.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍗 鮮樂炸雞</h1>
      <p>每日現金回報</p>
    </div>
    
    <div id="formView">
      <div style="text-align: center;">
        <input type="date" id="reportDate" style="background:#d32f2f;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;text-align:center;">
        <div id="todayDate" style="color:#999;font-size:12px;margin-top:4px;"></div>
      </div>
      
      <div class="card" style="background:#e3f2fd;border-left:4px solid #1565c0;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;color:#666;margin-bottom:4px;">💰 今日零用金（昨日結餘）</div>
            <div style="font-size:24px;font-weight:bold;color:#1565c0;" id="pettyCash">載入中...</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;color:#999;">自動帶入</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">基本資料</div>
        
        <div class="form-group">
          <label>店家</label>
          <select id="store" required>
            <option value="">請選擇店家</option>
            <option value="總店">總店（東信路）</option>
            <option value="麥金店">麥金店</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>填報人</label>
          <input type="text" id="reporter" placeholder="請輸入您的名字" required>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">現金面額清點</div>
        
        <div class="denom-grid">
          <div class="denom-item">
            <div class="denom-label">🪙 1 元硬幣（枚）</div>
            <input type="number" id="c1" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item">
            <div class="denom-label">🪙 5 元硬幣（枚）</div>
            <input type="number" id="c5" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item">
            <div class="denom-label">🪙 10 元硬幣（枚）</div>
            <input type="number" id="c10" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item">
            <div class="denom-label">🪙 50 元硬幣（枚）</div>
            <input type="number" id="c50" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item">
            <div class="denom-label">💵 100 元紙鈔（張）</div>
            <input type="number" id="b100" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item">
            <div class="denom-label">💵 500 元紙鈔（張）</div>
            <input type="number" id="b500" class="denom-input" value="0" min="0">
          </div>
          <div class="denom-item" style="grid-column: span 2;">
            <div class="denom-label">💵 1000 元紙鈔（張）</div>
            <input type="number" id="b1000" class="denom-input" value="0" min="0">
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">銷售資料</div>
        
        <div class="form-group">
          <label>系統銷售額（POS）</label>
          <input type="number" id="systemSales" placeholder="請輸入系統銷售額" min="0">
        </div>
        
        <div class="form-group">
          <label>線上收款（線上點餐）</label>
          <input type="number" id="onlinePayment" placeholder="請輸入線上收款金額" min="0" value="0">
        </div>
        
        <div class="summary-card">
          <div class="summary-row">
            <span>現場現金</span>
            <span id="cashTotal">$0</span>
          </div>
          <div class="summary-row">
            <span>線上收款</span>
            <span id="onlineDisplay">$0</span>
          </div>
          <div class="summary-row">
            <span>合計</span>
            <span id="totalDisplay">$0</span>
          </div>
        </div>
        
        <div class="diff-display diff-ok" id="diffDisplay">差異：$0</div>
      </div>
      
      <div class="card">
        <div class="form-group">
          <label>備註（選填）</label>
          <input type="text" id="note" placeholder="有任何異常請說明">
        </div>
      </div>
      
      <button class="submit-btn" id="submitBtn" onclick="submitForm()">送出回報</button>
      <div class="status-bar" id="statusBar"></div>
    </div>
    
    <div id="resultView" style="display:none;">
      <div class="card">
        <div class="result">
          <div class="result-icon">✅</div>
          <div class="result-text" id="resultText">回報已送出！</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyA3f9deGRKW64lBqNoMIAr4d_P5u7XPSoA",
      authDomain: "xianle-cash.firebaseapp.com",
      projectId: "xianle-cash",
      storageBucket: "xianle-cash.firebasestorage.app",
      messagingSenderId: "843450474089",
      appId: "1:843450474089:web:7811c37a414826c73d4cf8",
      measurementId: "G-J2H6037C64"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Expose to global scope
    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.serverTimestamp = serverTimestamp;
    window.query = query;
    window.orderBy = orderBy;
    window.limit = limit;
    window.getDocs = getDocs;
  </script>
  
  <script>
    // Initialize date
    const today = new Date();
    const dateInput = document.getElementById('reportDate');
    dateInput.value = today.toISOString().split('T')[0];
    document.getElementById('todayDate').textContent = today.toLocaleDateString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // 日期更換時重新載入零用金
    dateInput.addEventListener('change', () => {
      const d = new Date(dateInput.value);
      document.getElementById('todayDate').textContent = d.toLocaleDateString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      // 更新 today 供其他function使用
      window.reportDate = d;
      loadPettyCash();
    });

    // 頁面載入時自動抓一次零用金
    window.addEventListener('load', () => {
      setTimeout(loadPettyCash, 300);
    });

    window.reportDate = today;
    window.today = today;

    // Store name → store_id mapping (matches bot's STORES)
    const STORE_NAME_TO_ID = {
      '總店': 'zongdian',
      '麥金店': 'maijin',
    };
    const STORE_ID_TO_NAME = {
      'zongdian': '東信路總店',
      'maijin': '麥金店',
    };
    
    // Load today's petty cash (改為讓用戶自行輸入零用金，廢除自動計算)
    async function loadPettyCash() {
      const selectedDate = document.getElementById('reportDate').value;
      if (!selectedDate) return;
      const storeName = document.getElementById('store').value;
      const storeId = STORE_NAME_TO_ID[storeName];
      
      if (!storeName) {
        document.getElementById('pettyCash').textContent = '$--';
        return;
      }
      
      // 查 petty_settings（用戶自行設定的零用金）
      try {
        const settingsUrl = `https://firestore.googleapis.com/v1/projects/xianle-cash/databases/(default)/documents:runQuery`;
        const settingsRes = await fetch(settingsUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            structuredQuery: {
              from: [{ collectionId: 'petty_settings' }],
              where: {
                compositeFilter: {
                  op: 'AND',
                  filters: [
                    { fieldFilter: { field: { fieldPath: 'store_id' }, op: 'EQUAL', value: { stringValue: storeId } } },
                    { fieldFilter: { field: { fieldPath: 'date' }, op: 'EQUAL', value: { stringValue: selectedDate } } }
                  ]
                }
              },
              limit: 1
            }
          })
        });
        const settingsData = await settingsRes.json();
        for (const item of settingsData) {
          if (item.document && item.document.fields && item.document.fields.amount) {
            const amount = parseInt(item.document.fields.amount.integerValue || item.document.fields.amount.doubleValue || 0);
            document.getElementById('pettyCash').textContent = '$' + amount.toLocaleString();
            return;
          }
        }
      } catch (e) {
        console.error('Failed to load petty settings:', e);
      }
      
      // 如果沒有設定過，顯示 $-- 讓用戶自己填
      document.getElementById('pettyCash').textContent = '$--（未設定）';
    }

          }
        };
        
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        
        let yesterdayCash = 0;
        for (const item of data) {
          if (item.document && item.document.fields) {
            const f = item.document.fields;
            const cash = parseInt(f.cashReceived?.integerValue || f.cashReceived?.doubleValue || 0);
            yesterdayCash = cash;
            break;
          }
        }
        
        const pettyCash = yesterdayCash + 2000;
        document.getElementById('pettyCash').textContent = '$' + pettyCash.toLocaleString();
      } catch (e) {
        console.error('Failed to load petty cash:', e);
        document.getElementById('pettyCash').textContent = '$0';
      }
    }
    
    function calcCash() {
      const c1 = parseInt(document.getElementById('c1').value) || 0;
      const c5 = parseInt(document.getElementById('c5').value) || 0;
      const c10 = parseInt(document.getElementById('c10').value) || 0;
      const c50 = parseInt(document.getElementById('c50').value) || 0;
      const b100 = parseInt(document.getElementById('b100').value) || 0;
      const b500 = parseInt(document.getElementById('b500').value) || 0;
      const b1000 = parseInt(document.getElementById('b1000').value) || 0;
      
      const coinTotal = c1 * 1 + c5 * 5 + c10 * 10 + c50 * 50;
      const billTotal = b100 * 100 + b500 * 500 + b1000 * 1000;
      const cashTotal = coinTotal + billTotal;
      
      return cashTotal;
    }
    
    function updateDiff() {
      const cashTotal = calcCash();
      const pettyCash = parseInt(document.getElementById('pettyCash').textContent.replace(/[$,]/g, '')) || 0;
      const cashReceived = cashTotal - pettyCash; // 現場現金 = 面額總計 - 今日零用金
      const online = parseInt(document.getElementById('onlinePayment').value) || 0;
      const system = parseInt(document.getElementById('systemSales').value) || 0;
      const total = cashReceived + online; // 合計 = 現場現金 + 線上收款
      const diff = total - (system + online); // 差異 = 合計 - 銷售額
      
      document.getElementById('cashTotal').textContent = '$' + cashReceived.toLocaleString();
      document.getElementById('onlineDisplay').textContent = '$' + online.toLocaleString();
      document.getElementById('totalDisplay').textContent = '$' + total.toLocaleString();
      
      const diffEl = document.getElementById('diffDisplay');
      if (diff === 0) {
        diffEl.className = 'diff-display diff-ok';
        diffEl.textContent = '差異：$0 ✅';
      } else if (Math.abs(diff) <= 50) {
        diffEl.className = 'diff-display diff-warn';
        diffEl.textContent = '差異：' + (diff > 0 ? '+$' : '-$') + Math.abs(diff).toLocaleString() + ' ⚠️';
      } else {
        diffEl.className = 'diff-display diff-error';
        diffEl.textContent = '差異：' + (diff > 0 ? '+$' : '-$') + Math.abs(diff).toLocaleString() + ' ❌';
      }
    }
    
    ['c1','c5','c10','c50','b100','b500','b1000','systemSales','onlinePayment'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateDiff);
    });
    
    // 選擇店家後自動載入零用金
    document.getElementById('store').addEventListener('change', () => {
      const store = document.getElementById('store').value;
      if (store) {
        loadPettyCash();
      } else {
        document.getElementById('pettyCash').textContent = '$--';
      }
    });
    
    // 頁面載入時，若店家已有值則自動查詢
    (function initPettyCash() {
      const store = document.getElementById('store').value;
      if (store) {
        loadPettyCash();
      }
    })();
    
    async function submitForm() {
      const store = document.getElementById('store').value;
      const reporter = document.getElementById('reporter').value.trim();
      const systemSales = parseInt(document.getElementById('systemSales').value) || 0;
      const onlinePayment = parseInt(document.getElementById('onlinePayment').value) || 0;
      const note = document.getElementById('note').value.trim();
      
      if (!store) { alert('請選擇店家'); return; }
      if (!reporter) { alert('請輸入填報人'); return; }
      if (!systemSales) { alert('請輸入系統銷售額'); return; }
      
      const cashTotal = calcCash();
      const pettyCash = parseInt(document.getElementById('pettyCash').textContent.replace(/[$,]/g, '')) || 0;
      const cashReceived = cashTotal - pettyCash; // 現場現金
      const totalReceived = cashReceived + onlinePayment; // 合計
      const diff = totalReceived - (systemSales + onlinePayment); // 差異
      
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').textContent = '送出中...';
      
      try {
        await addDoc(collection(window.db, 'reports'), {
          date: today.toISOString().split('T')[0],
          store: store,
          reporter: reporter,
          systemSales: systemSales,
          cashReceived: cashReceived,
          onlinePayment: onlinePayment,
          totalReceived: totalReceived,
          pettyCash: pettyCash,
          diff: diff,
          note: note,
          timestamp: new Date().toISOString()
        });
        
        document.getElementById('formView').style.display = 'none';
        document.getElementById('resultView').style.display = 'block';
        document.getElementById('resultText').textContent = '回報已送出！';
      } catch (e) {
        document.getElementById('statusBar').className = 'status-bar error';
        document.getElementById('statusBar').textContent = '送出失敗：' + e.message;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = '送出回報';
      }
    }
  </script>
</body>
</html>
